<div class="app-container">
  <!-- Navbar -->
  <mat-toolbar color="primary" class="mat-elevation-z4 premium-toolbar" *ngIf="isLoggedIn">
    <div class="toolbar-content">
      <div class="brand" routerLink="/employees">
        <mat-icon>group</mat-icon>
        <span>EMS Portal</span>
      </div>
      <span class="spacer"></span>
      <button mat-button routerLink="/employees">Employees</button>
      <button mat-flat-button color="accent" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </mat-toolbar>

  <!-- Main Content -->
  <main class="main-content" [class.no-toolbar]="!isLoggedIn">
    <router-outlet></router-outlet>
  </main>
</div>
