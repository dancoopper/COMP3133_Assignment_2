<div class="list-container">
  <div class="header-actions">
    <h2>Employee Directory</h2>
    <button mat-flat-button color="primary" routerLink="/employees/add">
      <mat-icon>person_add</mat-icon> Add Employee
    </button>
  </div>

  <mat-card class="search-card">
    <form [formGroup]="searchForm" (ngSubmit)="onSearch()" class="search-form">
      <mat-form-field appearance="outline">
        <mat-label>Department</mat-label>
        <input matInput formControlName="department" placeholder="e.g. Engineering">
      </mat-form-field>
      
      <mat-form-field appearance="outline">
        <mat-label>Designation</mat-label>
        <input matInput formControlName="designation" placeholder="e.g. Developer">
      </mat-form-field>

      <div class="search-buttons">
        <button mat-flat-button color="accent" type="submit">
          <mat-icon>search</mat-icon> Search
        </button>
        <button mat-stroked-button type="button" (click)="resetSearch()">
          Clear
        </button>
      </div>
    </form>
  </mat-card>

  <mat-card class="table-card mat-elevation-z4">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>

        <!-- Photo Column -->
        <ng-container matColumnDef="photo">
          <th mat-header-cell *matHeaderCellDef> Photo </th>
          <td mat-cell *matCellDef="let row">
            <div class="avatar" *ngIf="!row.employee_photo">{{getAvatarInitial(row.first_name, row.last_name)}}</div>
            <img class="avatar-img" *ngIf="row.employee_photo" [src]="row.employee_photo" alt="Photo">
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
          <td mat-cell *matCellDef="let row"> <strong>{{row.first_name}} {{row.last_name}}</strong> </td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
          <td mat-cell *matCellDef="let row"> <a [href]="'mailto:' + row.email">{{row.email}}</a> </td>
        </ng-container>

        <!-- Department Column -->
        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Dept </th>
          <td mat-cell *matCellDef="let row">
            <span class="badge badge-primary">{{row.department}}</span>
          </td>
        </ng-container>

        <!-- Designation Column -->
        <ng-container matColumnDef="designation">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Pos </th>
          <td mat-cell *matCellDef="let row"> {{row.designation}} </td>
        </ng-container>
        
        <!-- Salary Column -->
        <ng-container matColumnDef="salary">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Salary </th>
          <td mat-cell *matCellDef="let row"> {{row.salary | currency}} </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="primary" [routerLink]="['/employees', row.id]" matTooltip="View Details">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="accent" [routerLink]="['/employees', row.id, 'edit']" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteEmployee(row.id)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="employee-row"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-cell" colspan="7" *ngIf="!isLoading">No employees found.</td>
          <td class="mat-cell empty-cell" colspan="7" *ngIf="isLoading">Loading data...</td>
        </tr>
      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of employees"></mat-paginator>
  </mat-card>
</div>
